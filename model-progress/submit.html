<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交模型需求 - AI算力管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .form-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 600px; overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 2rem; text-align: center; }
        .form-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .form-header p { font-size: 0.875rem; opacity: 0.9; }
        .form-body { padding: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        .form-label .required { color: #ef4444; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.75rem 1rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 0.9rem; transition: all 0.2s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .form-textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-hint { font-size: 0.75rem; color: #9ca3af; margin-top: 0.25rem; }
        .form-footer { padding: 1rem 2rem 2rem; display: flex; gap: 1rem; justify-content: flex-end; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.4); }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; }
        .priority-group { display: flex; gap: 1rem; }
        .priority-option { flex: 1; padding: 0.75rem; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; }
        .priority-option:hover { border-color: #4f46e5; }
        .priority-option.selected { border-color: #4f46e5; background: #eef2ff; }
        .priority-option input { display: none; }
        .priority-option .icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .priority-option .text { font-size: 0.75rem; color: #6b7280; }
        .priority-option.selected .text { color: #4f46e5; font-weight: 500; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>提交模型需求</h1>
            <p>填写以下信息以提交新的AI模型需求申请</p>
        </div>
        <form id="requestForm">
            <div class="form-body">
                <div class="form-group">
                    <label class="form-label">需求名称 <span class="required">*</span></label>
                    <input type="text" class="form-input" name="name" required placeholder="例如：智能客服对话系统">
                </div>
                <div class="form-group">
                    <label class="form-label">需求描述 <span class="required">*</span></label>
                    <textarea class="form-textarea" name="description" required placeholder="请详细描述您的需求，包括使用场景、预期功能等"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">申请人 <span class="required">*</span></label>
                        <input type="text" class="form-input" name="requester" required placeholder="您的姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属部门 <span class="required">*</span></label>
                        <input type="text" class="form-input" name="department" required placeholder="例如：产品运营部">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">目标模型 <span class="required">*</span></label>
                        <select class="form-select" name="targetModel" required>
                            <option value="">请选择模型</option>
                            <option value="GLM4-9B">GLM4-9B</option>
                            <option value="GLM4-7B">GLM4-7B</option>
                            <option value="GPT-4">GPT-4</option>
                            <option value="GPT-3.5">GPT-3.5</option>
                            <option value="Claude-3">Claude-3</option>
                            <option value="LLaMA-70B">LLaMA-70B</option>
                            <option value="Qwen-VL">Qwen-VL</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">优先级</label>
                        <div class="priority-group">
                            <label class="priority-option" onclick="selectPriority(this)">
                                <input type="radio" name="priority" value="high">
                                <div class="icon">🔴</div>
                                <div class="text">高优先级</div>
                            </label>
                            <label class="priority-option selected" onclick="selectPriority(this)">
                                <input type="radio" name="priority" value="medium" checked>
                                <div class="icon">🟡</div>
                                <div class="text">中优先级</div>
                            </label>
                            <label class="priority-option" onclick="selectPriority(this)">
                                <input type="radio" name="priority" value="low">
                                <div class="icon">🟢</div>
                                <div class="text">低优先级</div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-footer">
                <button type="button" class="btn btn-secondary" onclick="goBack()">返回</button>
                <button type="submit" class="btn btn-primary">提交需求</button>
            </div>
        </form>
    </div>

    <script>
        function selectPriority(el) {
            document.querySelectorAll('.priority-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        document.getElementById('requestForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);

            // 存储到localStorage
            const requests = JSON.parse(localStorage.getItem('modelRequests') || '[]');
            const newRequest = {
                id: Date.now(),
                name: formData.get('name'),
                description: formData.get('description'),
                requester: formData.get('requester'),
                department: formData.get('department'),
                targetModel: formData.get('targetModel'),
                priority: formData.get('priority'),
                currentStage: 'collection',
                createdAt: new Date().toISOString().split('T')[0],
                stages: {
                    collection: { completed: true, date: new Date().toISOString().split('T')[0] },
                    review: { completed: false, date: '' },
                    deployment: { completed: false, date: '' },
                    evaluation: { completed: false, date: '' },
                    launch: { completed: false, date: '' },
                    acceptance: { completed: false, date: '' }
                }
            };
            requests.unshift(newRequest);
            localStorage.setItem('modelRequests', JSON.stringify(requests));

            alert('提交成功！');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
